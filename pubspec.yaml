name: melodix
description: Music streaming app — SoundCloud + Glassmorphism UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio
  just_audio: ^0.9.39
  just_audio_background: ^0.0.1-beta.11
  audio_service: ^0.18.14

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Almacenamiento local
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Networking
  dio: ^5.4.3+1

  # UI
  cached_network_image: ^3.3.1
  palette_generator: ^0.3.3+3
  blur: ^4.0.0
  lottie: ^3.1.2

  # Extras
  rxdart: ^0.27.7
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
